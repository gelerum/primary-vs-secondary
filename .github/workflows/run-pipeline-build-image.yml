name: DVC Pipeline in Docker & Push GHCR
on:
  push:
    paths:
      - 'src/**'
      - 'Dockerfile'
      - 'dvc.yaml'
      - 'params.yaml'
      - 'requirements.txt'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  run_pipeline_and_push:
    name: Run DVC in Docker, Commit, Push to GHCR
    runs-on: self-hosted
    permissions:
      packages: write
      contents: write
    
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker Image locally
        run: docker build -t my-ml-image:latest .

      - name: Run DVC inside Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            -e AWS_ACCESS_KEY_ID=${{ secrets.DVC_ACCESS_KEY_ID }} \
            -e AWS_SECRET_ACCESS_KEY=${{ secrets.DVC_SECRET_ACCESS_KEY }} \
            my-ml-image:latest \
            bash -c "git config --global --add safe.directory /app && dvc pull && dvc repro && dvc push"

      - name: Commit and Push dvc.lock
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dvc.lock
          # [skip ci] нужен, чтобы не вызвать бесконечный цикл запусков Actions
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update dvc.lock [skip ci]"
          git push

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,format=short

      - name: Push Docker image to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
name: DVC Pipeline in Docker & Push GHCR

on:
  push:
    paths:
      - 'src/**'
      - 'Dockerfile'
      - 'dvc.yaml'
      - 'dvc.lock'
      - 'params.yaml'
      - '.github/workflows/run-pipeline-build-image.yml'
      - 'requirements.txt'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: my-ml-image
  BUILD_CACHE_PATH: /tmp/.buildx-cache

jobs:
  run_pipeline_and_push:
    name: Run DVC Pipeline in Docker
    runs-on: self-hosted
    permissions:
      contents: write
      packages: write

    steps:
      - name: Free Disk Space
        run: |
          echo "=== Disk before cleanup ==="
          df -h
          docker system prune -af --volumes || true
          docker builder prune -af || true
          echo "=== Disk after cleanup ==="
          df -h

      - name: Fix Workspace Permissions
        run: |
          echo "=== Fixing workspace permissions ==="
          WORKSPACE="${{ github.workspace }}"

          chown -R "$(id -u):$(id -g)" "$WORKSPACE" 2>/dev/null && echo "✓ chown without sudo" || {
            echo "→ Trying sudo..."
            sudo -n chown -R "$(id -u):$(id -g)" "$WORKSPACE" 2>/dev/null && echo "✓ chown with sudo" || \
            echo "⚠️ chown failed (often harmless on self-hosted runners)"
          }

          # Fix .git and DVC directories
          chown -R "$(id -u):$(id -g)" .git 2>/dev/null || sudo -n chown -R "$(id -u):$(id -g)" .git 2>/dev/null || true
          mkdir -p .dvc/cache
          chmod -R u+rwX .dvc 2>/dev/null || true
          echo "=== Permission fixing completed ==="

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image (Fast Local Cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: my-ml-image:latest
          target: final                    # ← Important
          cache-from: |
            type=local,src=/tmp/.buildx-cache
            type=gha
          cache-to: |
            type=local,dest=/tmp/.buildx-cache,mode=max
            type=gha,mode=min

      - name: Run DVC Pipeline
        run: |
          echo "=== Starting DVC Pipeline ==="
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            -u $(id -u):$(id -g) \
            -e HOME=/tmp \
            -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
            -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
            -e AWS_REQUEST_CHECKSUM_CALCULATION=when_required \
            -e AWS_RESPONSE_CHECKSUM_VALIDATION=when_required \
            ${{ env.IMAGE_NAME }}:latest \
            bash -c '
              set -euo pipefail
              git config --global --add safe.directory /app
              dvc pull --force
              dvc repro --force
              dvc push
              echo "=== DVC Pipeline completed successfully ==="
            '

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git fetch origin
          
          if git diff --quiet origin/${{ github.ref_name }} -- dvc.lock reports/; then
            echo "No changes to commit"
          else
            git add dvc.lock reports/
            git commit -m "chore: update dvc.lock and reports from CI [skip ci]"
            git push --force-with-lease origin HEAD:${{ github.ref_name }}
            echo "Changes pushed successfully"
          fi
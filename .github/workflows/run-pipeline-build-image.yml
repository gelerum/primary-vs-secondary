name: DVC Pipeline in Docker & Push GHCR
on:
  push:
    paths:
      - 'src/**'
      - 'Dockerfile'
      - 'dvc.yaml'
      - 'params.yaml'
      - '.github/workflows/run-pipeline-build-image.yml'
      - 'requirements.txt'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  run_pipeline_and_push:
    name: Run DVC in Docker, Commit, Push to GHCR
    runs-on: self-hosted
    permissions:
      packages: write
      contents: write
    
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image locally
        run: docker build -t my-ml-image:latest .

      - name: Run DVC inside Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
            -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
            -e AWS_REQUEST_CHECKSUM_CALCULATION=when_required \
            -e AWS_RESPONSE_CHECKSUM_VALIDATION=when_required \
            my-ml-image:latest \
            bash -c '
              # Узнаем ID пользователя, которому принадлежит папка на хосте
              HOST_USER=$(stat -c "%u:%g" /app);
              
              # Гарантируем, что при выходе из контейнера права вернутся владельцу
              trap "chown -R $HOST_USER /app" EXIT;
              
              # Основной пайплайн
              git config --global --add safe.directory /app && \
              dvc pull && \
              dvc repro && \
              dvc push
            '
      - name: Commit and Push changes (dvc.lock + reports)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Обновляемся с remote
          git fetch origin

          # Важно: ребейзим текущую ветку на origin, отдавая приоритет изменениям из CI
          # (то, что только что сгенерировал dvc repro внутри Docker)
          if ! git rebase origin/${{ github.ref_name }} -X theirs; then
            echo "Rebase conflict detected → forcing CI version"
            git rebase --abort
            git reset --hard origin/${{ github.ref_name }}
            git rebase origin/${{ github.ref_name }} -X theirs || true
          fi

          # Добавляем наши свежие файлы
          git add dvc.lock reports/

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update dvc.lock and reports from CI [skip ci]"
            
            # Пушим с force-with-lease (безопаснее force)
            git push --force-with-lease origin HEAD:${{ github.ref_name }}
          fi

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,format=short

      - name: Push Docker image to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
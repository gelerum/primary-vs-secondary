name: DVC Pipeline in Docker & Push GHCR

on:
  push:
    paths:
      - 'src/**'
      - 'Dockerfile'
      - 'dvc.yaml'
      - 'params.yaml'
      - '.github/workflows/run-pipeline-build-image.yml'
      - 'requirements.txt'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  run_pipeline_and_push:
    name: Run DVC in Docker, Commit, Push to GHCR
    runs-on: self-hosted
    permissions:
      packages: write
      contents: write

    steps:
      - name: Clean workspace permissions (prevent checkout errors)
        run: |
          sudo chown -R $(id -u):$(id -g) ${{ github.workspace }} 2>/dev/null || true
          sudo rm -rf .dvc/cache 2>/dev/null || true

      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image locally
        run: docker build -t my-ml-image:latest .

      - name: Run DVC inside Docker
        run: |
          HOST_UID=$(id -u)
          HOST_GID=$(id -g)

          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -v /etc/passwd:/etc/passwd:ro \
            -v /etc/group:/etc/group:ro \
            -w /app \
            -u ${HOST_UID}:${HOST_GID} \
            -e HOME=/tmp \
            -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
            -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
            -e AWS_REQUEST_CHECKSUM_CALCULATION=when_required \
            -e AWS_RESPONSE_CHECKSUM_VALIDATION=when_required \
            my-ml-image:latest \
            bash -c '
              set -e
              git config --global --add safe.directory /app

              echo "=== Starting DVC pipeline ==="
              dvc pull --force || echo "Warning: dvc pull had some issues"
              dvc repro --force
              dvc push
              echo "=== DVC pipeline finished successfully ==="
            '

      - name: Commit and Push changes (dvc.lock + reports)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin

          if ! git rebase origin/${{ github.ref_name }} -X theirs; then
            echo "Rebase conflict detected → forcing CI version"
            git rebase --abort
            git reset --hard origin/${{ github.ref_name }}
            git rebase origin/${{ github.ref_name }} -X theirs || true
          fi

          git add dvc.lock reports/

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update dvc.lock and reports from CI [skip ci]"
            git push --force-with-lease origin HEAD:${{ github.ref_name }}
          fi
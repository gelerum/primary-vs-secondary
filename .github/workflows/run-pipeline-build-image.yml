name: DVC Pipeline in Docker & Push GHCR

on:
  push:
    paths:
      - 'src/**'
      - 'Dockerfile'
      - 'dvc.yaml'
      - 'dvc.lock'
      - 'params.yaml'
      - '.github/workflows/run-pipeline-build-image.yml'
      - 'requirements.txt'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  run_pipeline_and_push:
    name: Run DVC in Docker & Commit
    runs-on: self-hosted
    permissions:
      packages: write
      contents: write

    steps:
      - name: Free Disk Space (Critical)
        run: |
          echo "=== Disk before cleanup ==="
          df -h
          
          # Aggressive Docker cleanup
          docker system prune -af --volumes || true
          docker builder prune -af || true
          
          # Remove old images
          docker image prune -af || true
          
          # Optional: clean old DVC cache (uncomment only if you have reliable remote)
          # echo "Cleaning old DVC cache..."
          # rm -rf .dvc/cache/* || true
          
          echo "=== Disk after cleanup ==="
          df -h

      - name: Clean workspace permissions
        run: |
          sudo chown -R $(id -u):$(id -g) ${{ github.workspace }} 2>/dev/null || true
          sudo rm -rf .dvc/cache/.cache 2>/dev/null || true

      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image (with cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: my-ml-image:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run DVC Pipeline
        run: |
          HOST_UID=$(id -u)
          HOST_GID=$(id -g)

          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -v /etc/passwd:/etc/passwd:ro \
            -v /etc/group:/etc/group:ro \
            -w /app \
            -u ${HOST_UID}:${HOST_GID} \
            -e HOME=/tmp \
            -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
            -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
            -e AWS_REQUEST_CHECKSUM_CALCULATION=when_required \
            -e AWS_RESPONSE_CHECKSUM_VALIDATION=when_required \
            my-ml-image:latest \
            bash -c '
              set -e
              git config --global --add safe.directory /app

              echo "=== Starting DVC pipeline ==="
              dvc pull --force
              dvc repro --force
              dvc push
              echo "=== DVC pipeline finished successfully ==="
            '

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin

          if ! git rebase origin/${{ github.ref_name }} -X theirs; then
            git rebase --abort
            git reset --hard origin/${{ github.ref_name }}
          fi

          git add dvc.lock reports/

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update dvc.lock and reports from CI [skip ci]"
            git push --force-with-lease origin HEAD:${{ github.ref_name }}
          fi
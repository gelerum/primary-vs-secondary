name: DVC Pipeline in Docker & Push GHCR

on:
  push:
    paths:
      - 'src/**'
      - 'Dockerfile'
      - 'dvc.yaml'
      - 'dvc.lock'
      - 'params.yaml'
      - '.github/workflows/run-pipeline-build-image.yml'
      - 'requirements.txt'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: my-ml-image
  BUILD_CACHE_PATH: /tmp/.buildx-cache

jobs:
  run_pipeline_and_push:
    name: Run DVC Pipeline in Docker
    runs-on: self-hosted
    permissions:
      contents: write
      packages: write

    steps:
      - name: Free Disk Space (Critical)
        run: |
          echo "=== Disk usage before cleanup ==="
          df -h
          
          docker system prune -af --volumes || true
          docker builder prune -af || true
          docker image prune -af || true
          
          echo "=== Disk usage after cleanup ==="
          df -h

      - name: Clean Workspace Permissions
        run: |
          sudo chown -R $(id -u):$(id -g) ${{ github.workspace }}
          rm -rf .dvc/cache/.cache 2>/dev/null || true
          echo "Workspace permissions fixed."

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Cleanup Old Build Cache
        run: |
          echo "Current build cache size:"
          du -sh ${BUILD_CACHE_PATH} 2>/dev/null || echo "No cache yet"
          # Optional: remove cache older than 7 days to prevent unbounded growth
          find ${BUILD_CACHE_PATH} -type f -mtime +7 -delete 2>/dev/null || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image (Optimized Cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ env.IMAGE_NAME }}:latest
          cache-from: |
            type=local,src=${{ env.BUILD_CACHE_PATH }}
            type=gha
          cache-to: |
            type=local,dest=${{ env.BUILD_CACHE_PATH }},mode=max
            type=gha,mode=min
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: Run DVC Pipeline
        run: |
          echo "=== Starting DVC Pipeline in Docker ==="

          HOST_UID=$(id -u)
          HOST_GID=$(id -g)

          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            -u ${HOST_UID}:${HOST_GID} \
            -e HOME=/tmp \
            -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
            -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
            -e AWS_REQUEST_CHECKSUM_CALCULATION=when_required \
            -e AWS_RESPONSE_CHECKSUM_VALIDATION=when_required \
            ${{ env.IMAGE_NAME }}:latest \
            bash -c '
              set -euo pipefail
              
              git config --global --add safe.directory /app
              git config --global user.name "github-actions[bot]"
              git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

              echo "Pulling latest DVC data..."
              dvc pull --force

              echo "Reproducing pipeline..."
              dvc repro --force

              echo "Pushing DVC artifacts..."
              dvc push

              echo "=== DVC Pipeline completed successfully ==="
            '

      - name: Commit and Push Changes
        run: |
          echo "=== Checking for changes to commit ==="

          git fetch origin

          # Safer approach than complex rebase
          if ! git diff --quiet origin/${{ github.ref_name }} -- dvc.lock reports/; then
            git add dvc.lock reports/
            
            git commit -m "chore: update dvc.lock and reports from CI [skip ci]" || {
              echo "Nothing to commit"
              exit 0
            }
            
            echo "Pushing changes..."
            git push --force-with-lease origin HEAD:${{ github.ref_name }}
            echo "Successfully pushed updated dvc.lock and reports."
          else
            echo "No changes to dvc.lock or reports. Nothing to commit."
          fi

      - name: Final Disk Usage
        if: always()
        run: |
          echo "=== Final disk usage ==="
          df -h
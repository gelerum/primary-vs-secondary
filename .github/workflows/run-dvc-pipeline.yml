name: Run DVC Pipeline

on:
  workflow_run:
    workflows: ["Build Docker Image"]
    types:
      - completed

  workflow_dispatch:

  push:
    paths:
      - '.github/workflows/run-dvc-pipeline.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run_pipeline_and_commit:
    name: Run DVC in Docker and Commit Changes
    runs-on: self-hosted

    # Run always except when workflow_run failed
    if: |
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'

    permissions:
      contents: write
      packages: read

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Determine correct image tag depending on trigger
      - name: Set image tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "IMAGE_TAG=${{ github.event.workflow_run.head_sha }}" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV
          fi

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Docker Image
        run: |
          docker pull ghcr.io/${{ github.repository_owner }}/my-ml-image:${IMAGE_TAG}

      # 🔥 Fix permissions BEFORE container runs
      - name: Prepare DVC cache (host)
        run: |
          sudo mkdir -p /nix/persistent/dvc-cache
          sudo chown -R $(id -u):$(id -g) /nix/persistent/dvc-cache
          sudo chmod -R u+rwX /nix/persistent/dvc-cache

      - name: Run DVC Pipeline inside Docker
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            --volume "${{ github.workspace }}:/app" \
            --volume "/nix/persistent/dvc-cache:/dvc-cache" \
            --workdir "/app" \
            --env "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}" \
            --env "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            --env "AWS_REQUEST_CHECKSUM_CALCULATION=when_required" \
            --env "AWS_RESPONSE_CHECKSUM_VALIDATION=when_required" \
            --env "HOME=/app/.home" \
            ghcr.io/${{ github.repository_owner }}/my-ml-image:${IMAGE_TAG} \
            bash -c '
              set -e

              echo "=== Configuring environment inside container ==="

              mkdir -p /app/.home
              chmod 700 /app/.home

              git config --global --add safe.directory /app
              git config --global user.name "github-actions[bot]"
              git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

              echo "=== Starting DVC pipeline ==="

              dvc pull --force --cache-dir /dvc-cache
              dvc repro --force
              dvc push --cache-dir /dvc-cache

              echo "=== DVC pipeline finished successfully ==="
            '

      - name: Commit and Push changes (dvc.lock + reports)
        run: |
          set -e

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git pull --rebase

          git add dvc.lock reports/ || true

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update dvc.lock and reports from CI [skip ci]"
            git push --force-with-lease
          fi
name: Run DVC Pipeline

on:
  workflow_run:
    workflows: ["Build Docker Image"]
    types:
      - completed

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run_pipeline_and_commit:
    name: Run DVC in Docker and Commit Changes
    runs-on: self-hosted
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write
      packages: read

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Docker Image
        run: |
          docker pull ghcr.io/${{ github.repository_owner }}/my-ml-image:${{ github.event.workflow_run.head_sha }}

      - name: Run DVC Pipeline inside Docker
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            --volume "${{ github.workspace }}:/app" \
            --volume "/nix/persistent/dvc-cache:/dvc-cache" \
            --workdir "/app" \
            --env "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}" \
            --env "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            --env "AWS_REQUEST_CHECKSUM_CALCULATION=when_required" \
            --env "AWS_RESPONSE_CHECKSUM_VALIDATION=when_required" \
            --env "HOME=/app/.home" \
            ghcr.io/${{ github.repository_owner }}/my-ml-image:${{ github.event.workflow_run.head_sha }} \
            bash -c '
              set -e
              echo "=== Configuring environment inside container ==="

              # Create a proper writable HOME directory (recommended for NixOS)
              mkdir -p /app/.home
              chown -R "$(id -u):$(id -g)" /app/.home
              chmod 700 /app/.home

              git config --global --add safe.directory /app

              git config --global user.name "github-actions[bot]"
              git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

              echo "=== DVC cache setup ==="
              mkdir -p /dvc-cache
              dvc cache dir /dvc-cache

              echo "=== Starting DVC pipeline ==="
              dvc pull --force
              dvc repro --force
              dvc push

              echo "=== DVC pipeline finished successfully ==="
            '
      - name: Commit and Push changes (dvc.lock + reports)
        run: |
          set -e
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git pull --rebase

          git add dvc.lock reports/

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update dvc.lock and reports from CI [skip ci]"
            git push --force-with-lease
          fi
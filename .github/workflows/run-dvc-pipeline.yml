name: Run DVC Pipeline

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run_pipeline_and_commit:
    name: Run DVC in Docker and Commit Changes
    runs-on: self-hosted

    # Run always except when workflow_run failed
    if: |
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'

    permissions:
      contents: write
      packages: read

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Determine correct image tag depending on trigger
      - name: Set image tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "IMAGE_TAG=${{ github.event.workflow_run.head_sha }}" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV
          fi

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Docker Image
        run: |
          docker pull ghcr.io/${{ github.repository_owner }}/my-ml-image:latest

      # 🔥 This step has been REMOVED.
      # The /nix/persistent/dvc-cache directory should be created and permissioned
      # on the self-hosted runner machine itself as a one-time setup task.
      - name: Run DVC Pipeline inside Docker
        run: |
          docker run --rm \
            --gpus all \
            --user "$(id -u):$(id -g)" \
            --volume "${{ github.workspace }}:/app" \
            --volume "/nix/persistent/dvc-cache:/dvc-cache" \
            --workdir "/app" \
            --env "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}" \
            --env "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            --env "AWS_REQUEST_CHECKSUM_CALCULATION=when_required" \
            --env "AWS_RESPONSE_CHECKSUM_VALIDATION=when_required" \
            --env "HOME=/app/.home" \
            ghcr.io/${{ github.repository_owner }}/my-ml-image:latest \
            bash -c '
              set -e

              echo "=== Configuring environment inside container ==="

              mkdir -p /app/.home
              chmod 700 /app/.home

              git config --global --add safe.directory /app
              git config --global user.name "github-actions[bot]"
              git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

              echo "=== Starting DVC pipeline ==="

              # 🔥 FIX: Configure the cache directory using dvc config
              dvc config --local cache.dir /dvc-cache

              # 🔥 FIX: Remove the --cache-dir flags from pull and push
              dvc pull --force
              dvc repro --force
              dvc push

              echo "=== DVC pipeline finished successfully ==="
            '
      - name: Commit and Push changes (dvc.lock + reports)
        run: |
          set -e

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # 1. Stage the specific changes generated by DVC
          git add dvc.lock reports/ || true

          # 2. Check if there are actually changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            # 3. Commit locally first
            git commit -m "chore: update dvc.lock and reports from CI [skip ci]"

            # 4. Pull latest changes and rebase your new commit on top of them
            # We use --autostash just in case there are other stray unstaged files
            git pull --rebase --autostash origin ${{ github.ref_name }}

            # 5. Push the result
            git push origin ${{ github.ref_name }}
          fi
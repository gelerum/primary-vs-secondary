name: DVC Pipeline in Docker

on:
  push:
    paths:
      - 'src/**'
      - 'Dockerfile'
      - 'dvc.yaml'
      - 'dvc.lock'
      - 'params.yaml'
      - '.github/workflows/run-dvc-pipeline.yml'
      - 'requirements.txt'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run_pipeline_and_commit:
    name: Run DVC in Docker and Commit Changes
    runs-on: self-hosted
    permissions:
      contents: write

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build Docker Image
        run: |
          # Clean cache before building (prevents most snapshot errors)
          docker builder prune -a -f || true

          docker build \
            --no-cache \
            --progress=plain \
            -t my-ml-image:latest .

      - name: Run DVC Pipeline inside Docker
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            --volume "${{ github.workspace }}:/app" \
            --volume "/nix/persistent/dvc-cache:/dvc-cache" \
            --workdir "/app" \
            --env "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}" \
            --env "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            --env "AWS_REQUEST_CHECKSUM_CALCULATION=when_required" \
            --env "AWS_RESPONSE_CHECKSUM_VALIDATION=when_required" \
            --env "HOME=/tmp/home" \
            my-ml-image:latest \
            bash -c '
              set -e
              echo "=== Configuring environment inside container ==="

              git config --global --add safe.directory /app

              # Use a writable home directory
              mkdir -p /tmp/home
              export HOME=/tmp/home

              git config --global user.name "github-actions[bot]"
              git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

              echo "=== DVC cache setup ==="
              dvc cache dir /dvc-cache

              echo "=== Starting DVC pipeline ==="
              dvc pull --force
              dvc repro --force
              dvc push

              echo "=== DVC pipeline finished successfully ==="
            '      - name: Commit and Push changes (dvc.lock + reports)
        run: |
          set -e
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # A simple pull-rebase is safer than complex auto-merging strategies
          git pull --rebase

          git add dvc.lock reports/

          # Check if there are any staged changes before attempting to commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update dvc.lock and reports from CI [skip ci]"
            # --force-with-lease is safer than a blind --force
            git push --force-with-lease
          fi
name: Scan deeply secrets leaks on schedule

on:
  schedule:
    - cron: "0 23 * * *" # 06:00 (UTC+7)
  workflow_dispatch:

jobs:
  gitleaks-full:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
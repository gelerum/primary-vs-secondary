stages:

  clean:
    cmd: python -m src.stages.clean
    deps:
      - src/stages/clean.py
      - src/clean
      - data/raw/Dataset_SCO_KVM_MONS_GRC_IZD_DMA_MTK_20250805.csv
      - data/raw/Etagi_secondary_classified_dataset_20250805.csv
      - data/raw/Etagi_secondary_dataset_20250805.csv
      - data/raw/msk_houses_deals_ds.csv
      - data/raw/msk_united_geo_market_deals.parquet
    params:
      - clean
    outs:
      - data/interim/clean.parquet

  geocode:
    cmd: python -m src.stages.geocode
    deps:
      - data/interim/clean.parquet
      # - secrets/geocoding/ya_api_keys.csv
      - src/stages/geocode.py
      - src/geocode
    params:
      - geocode
    outs:
      - data/interim/geocode.parquet
      - data/cache/geocodes_checkpoint.parquet:
          persist: true

  administrative_district:
    cmd: python -m src.stages.administrative_district
    deps:
      - src/stages/administrative_district.py
      - data/interim/geocode.parquet
      - src/administrative_district
      - data/complimentary/ao.cpg
      - data/complimentary/ao.dbf
      - data/complimentary/ao.prj
      - data/complimentary/ao.qml
      - data/complimentary/ao.qpj
      - data/complimentary/ao.shp
      - data/complimentary/ao.shx
    outs:
      - data/interim/administrative_district.parquet
    
  split:
    cmd: python -m src.stages.split
    deps:
      - src/stages/split.py
      - data/interim/administrative_district.parquet
    outs:
      - data/interim/split_train.parquet
      - data/interim/split_valid.parquet
      - data/interim/split_test.parquet

  price_discount:
    cmd: python -m src.stages.price_discount
    deps:
      - src/stages/price_discount.py
      - data/interim/split_train.parquet
      - data/interim/split_valid.parquet
      - data/interim/split_test.parquet
    outs:
      - data/interim/price_discount_train.parquet
      - data/interim/price_discount_valid.parquet
      - data/interim/price_discount_test.parquet
  
  ksearch:
    cmd: python -m src.stages.ksearch
    deps:
      - data/interim/price_discount_train.parquet
      - src/stages/ksearch.py
    params:
      - ksearch
    outs:
      - report/ksearch_metrics.json
      - report/ksearch_plot.png

  wnir:
    cmd: python -m src.stages.wnir
    deps:
      - data/interim/price_discount_train.parquet
      - data/interim/price_discount_valid.parquet
      - data/interim/price_discount_test.parquet
      - src/stages/wnir.py
    params:
      - wnir
    outs:
      - data/interim/wnir_train.parquet
      - data/interim/wnir_valid.parquet
      - data/interim/wnir_test.parquet

  umap:
    cmd: python -m src.stages.umap
    deps:
      - data/interim/price_discount_train.parquet
      - data/interim/price_discount_valid.parquet
      - data/interim/price_discount_test.parquet
      - src/stages/umap.py
    params:
      - umap
    outs:
      - data/interim/umap_train.parquet
      - data/interim/umap_valid.parquet
      - data/interim/umap_test.parquet

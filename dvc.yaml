stages:

  01_clean:
    cmd: python -m src.stages.01_clean
    deps:
      - src/stages/01_clean.py
      - src/clean
      - data/raw/Dataset_SCO_KVM_MONS_GRC_IZD_DMA_MTK_20250805.csv
      - data/raw/Etagi_secondary_classified_dataset_20250805.csv
      - data/raw/Etagi_secondary_dataset_20250805.csv
      - data/raw/msk_united_geo_market_deals.parquet
    outs:
      - data/interim/01_cleaned.parquet

  02_geocode:
    cmd: python -m src.stages.02_geocode
    deps:
      - data/interim/01_cleaned.parquet
      - secrets/geocoding/ya_api_keys.csv
      - src/stages/02_geocode.py
      - src/geocode
      
    outs:
      - data/interim/02_geocoded.parquet
      - data/cache/geocodes_checkpoint.parquet:
          persist: true

  03_filter:
    cmd: python -m src.stages.03_filter
    deps:
      - src/stages/03_filter.py
      - src/filter
      - data/interim/02_geocoded.parquet
    outs:
      - data/interim/03_filtered.parquet

  04a_price_discount:
    cmd: python -m src.stages.04a_price_discount
    deps:
      - src/stages/04a_price_discount.py
      - src/feature/price_discount.py
      - data/interim/03_filtered.parquet
    outs:
      - data/interim/04a_price_discounted.parquet

  04b_knn_features:
    cmd: python -m src.stages.04b_mean_knn
    deps:
      - src/stages/04b_mean_knn.py
      - data/interim/04a_price_discounted.parquet
      - src/feature/mean_knn.py
    outs:
      - data/interim/04b_mean_knn.parquet

  publish_processed:
    cmd: |
      cp data/interim/04b_mean_knn.parquet data/processed/final.parquet
      python -c "
      import pandas as pd
      df = pd.read_parquet('data/interim/04b_mean_knn.parquet')
      df.to_csv('data/processed/final.csv', index=False)
      "
    deps:
      - data/interim/04b_mean_knn.parquet
    outs:
      - data/processed/final.parquet
      - data/processed/final.csv